name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            git \
            libssl-dev \
            ninja-build \
            pkg-config \
            zlib1g-dev

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set up Lean toolchain
        run: |
          elan toolchain install "$(cat lean-toolchain)"
          elan default "$(cat lean-toolchain)"

      - name: Prepare Cap'n Proto source
        run: |
          if [ ! -d extern/capnproto/c++ ]; then
            rm -f extern/capnproto
            git clone --depth 1 https://github.com/capnproto/capnproto.git extern/capnproto
          fi

      - name: Build Cap'n Proto
        run: |
          cmake -S extern/capnproto/c++ -B extern/capnproto/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=ON
          cmake --build extern/capnproto/build --parallel

      - name: Build capnpc-lean4 plugin
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/extern/capnproto/build"
          cmake --build build --parallel

      - name: Generate Lean schema fixtures
        run: |
          export PATH="$PWD/build:$PWD/extern/capnproto/build/src/capnp:$PATH"
          ./scripts/generate-test-schemas.sh

      - name: Validate RPC parity matrix
        run: python3 test/scripts/validate_parity_matrix.py

      - name: Build Lean targets
        run: lake build

      - name: Run parity-critical Lean tests
        run: lake test -- --parity-critical
