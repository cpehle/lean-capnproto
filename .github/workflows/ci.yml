name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    env:
      CC: clang-18
      CXX: clang++-18
      CXXFLAGS: -stdlib=libc++
      LDFLAGS: -stdlib=libc++

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            gnupg \
            wget
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.gpg >/dev/null
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-toolchain-jammy-18.list
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-18 \
            cmake \
            curl \
            git \
            libc++-18-dev \
            libc++abi-18-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            zlib1g-dev

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set up Lean toolchain
        run: |
          elan toolchain install "$(cat lean-toolchain)"
          elan default "$(cat lean-toolchain)"

      - name: Prepare Cap'n Proto source
        env:
          CAPNP_SOURCE_REPO: https://github.com/cpehle/capnproto.git
          CAPNP_SOURCE_REF: feat/lean-plugin
          CAPNP_SOURCE_SHA: 480c7cde4be9931c35936ca6f9a64d015569962f
        run: |
          if [ ! -d extern/capnproto/c++ ]; then
            rm -f extern/capnproto
            git clone --depth 1 --branch "$CAPNP_SOURCE_REF" "$CAPNP_SOURCE_REPO" extern/capnproto
          fi
          test "$(git -C extern/capnproto rev-parse HEAD)" = "$CAPNP_SOURCE_SHA"

      - name: Build Cap'n Proto
        run: |
          cmake -S extern/capnproto/c++ -B extern/capnproto/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=ON
          cmake --build extern/capnproto/build --parallel

      - name: Build capnpc-lean4 plugin
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/extern/capnproto/build"
          cmake --build build --parallel

      - name: Generate Lean schema fixtures
        run: |
          export PATH="$PWD/build:$PWD/extern/capnproto/build/src/capnp:$PATH"
          ./scripts/generate-test-schemas.sh

      - name: Validate RPC parity matrix
        run: python3 test/scripts/validate_parity_matrix.py

      - name: Build Lean targets
        run: lake build

      - name: Run parity-critical Lean tests
        run: lake test -- --parity-critical
